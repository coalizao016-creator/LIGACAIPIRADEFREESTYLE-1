<html lang="pt-BR">
<head>

    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Batalhas - Coalizão 016</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --cor-primaria: #f39c12;
            --bg-dark: #0a0a0a;
            --bg-nav: #000000;
            --bg-card: #151515;
            --text-light: #ffffff;
            --fonte-titulo: 'Anton', sans-serif;
            --fonte-principal: 'Roboto', sans-serif;
        }

        body { 
            margin: 0; 
            font-family: var(--fonte-principal); 
            background: var(--bg-dark); 
            color: var(--text-light); 
        }

        /* --- MENU PADRONIZADO (EXATAMENTE COMO O INDEX) --- */
        nav { background: var(--bg-nav); padding: 15px 0; border-bottom: 2px solid #1a1a1a; position: sticky; top: 0; z-index: 2000; }
        .nav-container { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .nav-logo a { font-size: 1.6rem; font-weight: 900; color: #fff; text-decoration: none; text-transform: uppercase; font-family: var(--fonte-titulo); }
        .nav-logo span { color: var(--cor-primaria); }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-link { color: #fff !important; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--cor-primaria) !important; }

        .nav-social-group { display: flex; gap: 15px; margin-left: 10px; border-left: 1px solid #333; padding-left: 20px; }
        .nav-social { color: #fff; font-size: 1.1rem; transition: 0.3s; }
        .nav-social:hover { color: var(--cor-primaria); }

        /* --- ESTILOS ORIGINAIS DA PÁGINA --- */
        .batalhas-container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; text-align: center; }
        .batalhas-container h1 { font-family: var(--fonte-titulo); font-size: clamp(2rem, 8vw, 4rem); text-transform: uppercase; margin-bottom: 10px; }
        .form-container { max-width: 600px; margin: 40px auto; background: var(--bg-card); padding: 30px; border-radius: 10px; border: 1px solid #222; }
        .filters { display: flex; justify-content: center; gap: 15px; margin: 40px auto; background: var(--bg-card); padding: 20px; border-radius: 8px; max-width: 800px; flex-wrap: wrap; }
        .filters select { padding: 12px; border-radius: 5px; border: 1px solid #333; background-color: #000; color: #fff; cursor: pointer; }
        .filters button { padding: 12px 25px; background-color: var(--cor-primaria); color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; }
        .batalhas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-top: 40px; }
        .batalha-card { background-color: var(--bg-card); border-radius: 10px; padding: 30px; border: 1px solid #222; transition: 0.3s; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .batalha-card:hover { transform: translateY(-8px); border-color: var(--cor-primaria); }
        .batalha-card img { width: 120px; height: 120px; object-fit: cover; border-radius: 12px; margin-bottom: 20px; border: 2px solid #333; }
        .batalha-card h3 { color: var(--cor-primaria); margin: 0 0 10px 0; font-family: var(--fonte-titulo); letter-spacing: 1px; }

        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background-color: var(--bg-card); margin: 5% auto; padding: 40px; border: 1px solid #333; width: 90%; max-width: 600px; border-radius: 15px; position: relative; text-align: center; }
        .close-btn { color: #fff; position: absolute; top: 15px; right: 25px; font-size: 35px; cursor: pointer; }

        @media (max-width: 768px) {
            .nav-social-group { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="nav-logo"><a href="index.html">COALIZÃO<span>016</span></a></div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Início</a>
                <a href="batalhas.html" class="nav-link active">Batalhas</a>
                <a href="seletivas.html" class="nav-link">Seletivas</a>
                <a href="mapaindex.html" class="nav-link">Mapa</a>
                <div class="nav-social-group">
                    <a href="https://instagram.com/coalizao016" target="_blank" class="nav-social"><i class="fab fa-instagram"></i></a>
                    <a href="https://youtube.com/@Coalizao016" target="_blank" class="nav-social"><i class="fab fa-youtube"></i></a>
                    <a href="https://tiktok.com/@Coalizao016" target="_blank" class="nav-social"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <div class="batalhas-container">
        <h1>BATALHAS DA LIGA</h1>
        
        <div class="form-container">
            <h2 style="color: var(--cor-primaria);">Inscrições Encerradas</h2>
            <p>O cadastro de novas batalhas para a temporada atual foi encerrado. Acompanhe as redes para a próxima abertura!</p>
        </div>

        <div class="filters">
            <select id="filtro-dia"><option value="">Todos os Dias</option></select>
            <select id="filtro-cidade"><option value="">Todas as Cidades</option></select>
            <button id="limpar-filtros">Limpar</button>
        </div>
        
        <div class="batalhas-grid" id="batalhas-grid"></div>
    </div>

    <div id="batalha-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <footer style="text-align: center; padding: 60px 20px; color: #444; border-top: 1px solid #111;">
        <p>&copy; 2026 Coalizão 016 - A Voz do Interior Paulista</p>
    </footer>

    <script src="batalhas.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('batalhas-grid');
            const fDia = document.getElementById('filtro-dia');
            const fCidade = document.getElementById('filtro-cidade');
            const modal = document.getElementById('batalha-modal');
            const modalBody = document.getElementById('modal-body');
            const closeBtn = document.querySelector('.close-btn');

            function render(lista) {
                grid.innerHTML = lista.length ? lista.map(b => `
                    <div class="batalha-card" data-codigo="${b.codigo}">
                        <img src="images/${b.codigo}.png" onerror="this.src='images/placeholder.png'">
                        <h3>${b.nome}</h3>
                        <p><strong>📍 ${b.cidade}</strong></p>
                        <p>${b.dia}</p>
                    </div>
                `).join('') : '<p>Nenhuma batalha encontrada.</p>';
            }

            if (typeof batalhas !== 'undefined') {
                const cidades = [...new Set(batalhas.map(b => b.cidade))].sort();
                const dias = ['Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado', 'Domingo'];
                
                cidades.forEach(c => fCidade.innerHTML += `<option value="${c}">${c}</option>`);
                dias.forEach(d => fDia.innerHTML += `<option value="${d}">${d}</option>`);

                render(batalhas);

                const filtrar = () => {
                    const res = batalhas.filter(b => 
                        (fDia.value === '' || b.dia.includes(fDia.value)) &&
                        (fCidade.value === '' || b.cidade === fCidade.value)
                    );
                    render(res);
                };

                fDia.onchange = filtrar;
                fCidade.onchange = filtrar;
                document.getElementById('limpar-filtros').onclick = () => { fDia.value = ''; fCidade.value = ''; render(batalhas); };

                grid.onclick = (e) => {
                    const card = e.target.closest('.batalha-card');
                    if(card) {
                        const b = batalhas.find(x => x.codigo === card.dataset.codigo);
                        modalBody.innerHTML = `
                            <h2 style="color:var(--cor-primaria); font-family:var(--fonte-titulo); font-size:2.5rem;">${b.nome}</h2>
                            <p><strong>Cidade:</strong> ${b.cidade}</p>
                            <p><strong>Dia:</strong> ${b.dia}</p>
                            <p style="margin-top:15px;">${b.descricao || ''}</p>
                            <div style="margin-top:25px; display:flex; gap:10px; justify-content:center;">
                                ${(b.redes_sociais_links || []).map(l => `<a href="${l.url}" target="_blank" style="background:var(--cor-primaria); color:#000; padding:10px 20px; text-decoration:none; border-radius:5px; font-weight:bold;">${l.nome}</a>`).join('')}
                            </div>
                        `;
                        modal.style.display = 'block';
                    }
                };
                closeBtn.onclick = () => modal.style.display = 'none';
                window.onclick = (ev) => { if(ev.target === modal) modal.style.display = 'none'; };
            }
        });
    </script>
</body>
</html>
