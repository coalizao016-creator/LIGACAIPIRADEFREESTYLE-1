    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --cor-primaria: #f39c12;
            --bg-dark: #0a0a0a;
            --bg-nav: #000000;
            --bg-card: #151515;
            --text-light: #ffffff;
            --fonte-titulo: 'Anton', sans-serif;
            --fonte-principal: 'Roboto', sans-serif;
        }

        body { margin: 0; font-family: var(--fonte-principal); background: var(--bg-dark); color: var(--text-light); overflow-x: hidden; }

        /* --- MENU PADRONIZADO --- */
        nav { background: var(--bg-nav); padding: 15px 0; border-bottom: 2px solid #1a1a1a; position: sticky; top: 0; z-index: 2000; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .nav-logo a { font-size: 1.6rem; font-weight: 900; color: #fff; text-decoration: none; font-family: var(--fonte-titulo); }
        .nav-logo span { color: var(--cor-primaria); }
        .menu-toggle { display: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
        .nav-content { display: flex; align-items: center; gap: 25px; }
        .nav-links { display: flex; gap: 18px; }
        .nav-link { color: #fff !important; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .nav-link.active { color: var(--cor-primaria) !important; }
        .nav-social-group { display: flex; gap: 15px; border-left: 1px solid #333; padding-left: 20px; }
        .nav-social { color: #fff; font-size: 1.1rem; }

        /* --- CONTEÚDO --- */
        .batalhas-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        .batalhas-container h1 { font-family: var(--fonte-titulo); font-size: clamp(2.5rem, 10vw, 4.5rem); text-transform: uppercase; margin: 0; }
        
        .form-container { max-width: 600px; margin: 30px auto; background: var(--bg-card); padding: 25px; border-radius: 10px; border: 1px solid #222; font-size: 0.9rem; }

        /* --- FILTROS OTIMIZADOS --- */
        .filters { display: flex; justify-content: center; gap: 10px; margin: 30px auto; background: var(--bg-card); padding: 15px; border-radius: 8px; max-width: 900px; flex-wrap: wrap; }
        .filters select { flex: 1; min-width: 140px; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; font-size: 1rem; }
        .filters button { padding: 12px 20px; background: var(--cor-primaria); color: #000; font-weight: 900; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; }

        /* --- GRID DE CARDS --- */
        .batalhas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 30px; }
        .batalha-card { background: var(--bg-card); border-radius: 12px; padding: 25px; border: 1px solid #222; transition: 0.3s; position: relative; }
        .batalha-card:active { transform: scale(0.98); }
        .batalha-card img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--cor-primaria); margin-bottom: 15px; }
        .batalha-card h3 { font-family: var(--fonte-titulo); color: var(--cor-primaria); font-size: 1.8rem; margin: 0 0 10px 0; text-transform: uppercase; }
        .batalha-card p { margin: 5px 0; font-weight: bold; }

        /* --- MODAL MOBILE-FIRST --- */
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(8px); overflow-y: auto; }
        .modal-content { background: var(--bg-card); margin: 10% auto; padding: 30px; border: 1px solid #333; width: 85%; max-width: 500px; border-radius: 20px; position: relative; }
        .close-btn { color: #fff; position: absolute; top: 10px; right: 20px; font-size: 40px; cursor: pointer; z-index: 10; }

        @media (max-width: 992px) {
            .menu-toggle { display: block; }
            .nav-content { display: none; flex-direction: column; position: absolute; top: 70px; left: 0; width: 100%; background: #000; padding: 30px 0; border-bottom: 3px solid var(--cor-primaria); }
            .nav-content.active { display: flex; }
            .nav-links { flex-direction: column; width: 100%; text-align: center; gap: 20px; }
            .nav-link { font-size: 1.2rem; }
            .nav-social-group { border-left: none; margin-top: 20px; border-top: 1px solid #222; width: 80%; justify-content: center; padding-top: 20px; }
            .nav-social { font-size: 1.8rem; }
            .modal-content { margin: 20% auto; width: 90%; padding: 20px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="nav-logo"><a href="index.html">COALIZÃO<span>016</span></a></div>
            <div class="menu-toggle" id="mobile-menu"><i class="fas fa-bars"></i></div>
            <div class="nav-content" id="nav-content">
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Início</a>
                    <a href="batalhas.html" class="nav-link active">Batalhas</a>
                    <a href="seletivas.html" class="nav-link">Seletivas</a>
                    <a href="regulamento.html" class="nav-link">Regulamento</a>
                    <a href="mapaindex.html" class="nav-link">Mapa</a>
                </div>
                <div class="nav-social-group">
                    <a href="https://instagram.com/coalizao016" target="_blank" class="nav-social"><i class="fab fa-instagram"></i></a>
                    <a href="https://youtube.com/@Coalizao016" target="_blank" class="nav-social"><i class="fab fa-youtube"></i></a>
                    <a href="https://tiktok.com/@Coalizao016" target="_blank" class="nav-social"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <div class="batalhas-container">
        <h1>BATALHAS DA LIGA</h1>
        
        <div class="form-container">
            <h2 style="color: var(--cor-primaria); font-family: var(--fonte-titulo); margin: 0;">INSCRIÇÕES ENCERRADAS</h2>
            <p style="margin: 10px 0 0 0;">O cadastro de novas batalhas para a temporada atual foi encerrado. Fique atento às nossas redes para 2027!</p>
        </div>

        <div class="filters">
            <select id="filtro-dia"><option value="">Todos os Dias</option></select>
            <select id="filtro-cidade"><option value="">Todas as Cidades</option></select>
            <button id="limpar-filtros">Limpar</button>
        </div>
        
        <div class="batalhas-grid" id="batalhas-grid"></div>
    </div>

    <div id="batalha-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <footer style="text-align: center; padding: 60px 20px; color: #444; border-top: 1px solid #111;">
        <p>&copy; 2026 Coalizão 016 - A Voz do Interior Paulista</p>
    </footer>

    <script src="batalhas.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('batalhas-grid');
            const fDia = document.getElementById('filtro-dia');
            const fCidade = document.getElementById('filtro-cidade');
            const modal = document.getElementById('batalha-modal');
            const modalBody = document.getElementById('modal-body');
            const closeBtn = document.querySelector('.close-btn');

            // Menu Mobile Toggle
            const menuBtn = document.getElementById('mobile-menu');
            const navContent = document.getElementById('nav-content');
            menuBtn.addEventListener('click', () => {
                navContent.classList.toggle('active');
                menuBtn.querySelector('i').classList.toggle('fa-bars');
                menuBtn.querySelector('i').classList.toggle('fa-times');
            });

            function render(lista) {
                grid.innerHTML = lista.length ? lista.map(b => `
                    <div class="batalha-card" data-codigo="${b.codigo}">
                        <img src="images/${b.codigo}.png" onerror="this.src='images/placeholder.png'">
                        <h3>${b.nome}</h3>
                        <p>📍 ${b.cidade}</p>
                        <p style="color:var(--cor-primaria); font-size:0.8rem;">${b.dia}</p>
                    </div>
                `).join('') : '<p style="grid-column: 1/-1; padding: 40px;">Nenhuma batalha encontrada com esses filtros.</p>';
            }

            if (typeof batalhas !== 'undefined') {
                const cidades = [...new Set(batalhas.map(b => b.cidade))].sort();
                const dias = ['Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado', 'Domingo'];
                
                cidades.forEach(c => fCidade.innerHTML += `<option value="${c}">${c}</option>`);
                dias.forEach(d => fDia.innerHTML += `<option value="${d}">${d}</option>`);

                render(batalhas);

                const filtrar = () => {
                    const res = batalhas.filter(b => 
                        (fDia.value === '' || b.dia.includes(fDia.value)) &&
                        (fCidade.value === '' || b.cidade === fCidade.value)
                    );
                    render(res);
                };

                fDia.onchange = filtrar;
                fCidade.onchange = filtrar;
                document.getElementById('limpar-filtros').onclick = () => { fDia.value = ''; fCidade.value = ''; render(batalhas); };

                grid.onclick = (e) => {
                    const card = e.target.closest('.batalha-card');
                    if(card) {
                        const b = batalhas.find(x => x.codigo === card.dataset.codigo);
                        modalBody.innerHTML = `
                            <img src="images/${b.codigo}.png" onerror="this.src='images/placeholder.png'" style="width:120px; border-radius:15px; margin-bottom:15px;">
                            <h2 style="color:var(--cor-primaria); font-family:var(--fonte-titulo); font-size:2.2rem; margin:0;">${b.nome}</h2>
                            <p style="font-size:1.1rem; margin:10px 0;"><strong>${b.cidade}</strong></p>
                            <p>Ocorre toda: <strong>${b.dia}</strong></p>
                            <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
                            <p style="color:#aaa; line-height:1.4;">${b.descricao || 'Informações detalhadas em breve no Instagram oficial.'}</p>
                            <div style="margin-top:25px; display:flex; flex-direction:column; gap:10px;">
                                ${(b.redes_sociais_links || []).map(l => `
                                    <a href="${l.url}" target="_blank" style="background:var(--cor-primaria); color:#000; padding:15px; text-decoration:none; border-radius:8px; font-weight:900; text-transform:uppercase; font-size:0.9rem;">
                                        <i class="fab fa-instagram"></i> ${l.nome}
                                    </a>`).join('')}
                            </div>
                        `;
                        modal.style.display = 'block';
                        document.body.style.overflow = 'hidden'; // Trava scroll do fundo
                    }
                };
                
                const fecharModal = () => {
                    modal.style.display = 'none';
                    document.body.style.overflow = 'auto';
                };

                closeBtn.onclick = fecharModal;
                window.onclick = (ev) => { if(ev.target === modal) fecharModal(); };
            }
        });
    </script>
</body>
</html>
