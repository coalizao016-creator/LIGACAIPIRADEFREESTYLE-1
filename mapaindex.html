    <style>
        :root {
            --cor-primaria: #f39c12;
            --bg-dark: #0a0a0a;
            --bg-nav: #000000;
            --bg-card: #151515;
            --text-light: #ffffff;
            --fonte-titulo: 'Anton', sans-serif;
            --fonte-principal: 'Roboto', sans-serif;
        }

        body { 
            margin: 0; 
            font-family: var(--fonte-principal); 
            background: var(--bg-dark); 
            color: var(--text-light); 
            overflow-x: hidden;
        }

        /* --- MENU PADRONIZADO --- */
        nav { 
            background: var(--bg-nav); 
            padding: 15px 0; 
            border-bottom: 2px solid #1a1a1a; 
            position: sticky; 
            top: 0; 
            z-index: 2000; 
        }
        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .nav-logo a {
            font-size: 1.6rem;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            letter-spacing: -1px;
            font-style: italic;
            text-transform: uppercase;
        }
        .nav-logo span { color: var(--cor-primaria); }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-link {
            color: #fff !important;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem !important;
            letter-spacing: 1px;
            transition: 0.3s;
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute; width: 0; height: 2px;
            bottom: -5px; left: 0;
            background-color: var(--cor-primaria);
            transition: 0.3s;
        }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .nav-link:hover { color: var(--cor-primaria) !important; }

        .dropdown { position: relative; }
        .dropdown-content {
            display: none;
            position: absolute;
            background: #151515;
            min-width: 180px;
            top: 100%; right: 0;
            border-radius: 4px;
            border: 1px solid #222;
            padding: 10px 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .dropdown-content a { padding: 10px 20px; display: block; color: #fff; text-decoration: none; font-size: 0.9rem; }
        .dropdown-content a:hover { background: #222; color: var(--cor-primaria); }
        .dropdown:hover .dropdown-content { display: block; }

        .hamburger { display: none; cursor: pointer; }
        .bar { width: 25px; height: 3px; background-color: #fff; margin: 5px 0; transition: 0.4s; }

        @media (max-width: 850px) {
            .hamburger { display: block; }
            .nav-links {
                position: fixed;
                right: -100%; top: 65px;
                width: 80%; height: 100vh;
                background: #0f0f0f;
                flex-direction: column;
                padding-top: 50px;
                transition: 0.4s; gap: 30px;
                border-left: 1px solid #222;
            }
            .nav-links.active { right: 0; }
            .dropdown-content { position: static; background: transparent; display: block; text-align: center; border: none; box-shadow: none; }
        }

        /* --- ESTILOS DO MAPA --- */
        .map-container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; text-align: center; }
        
        .map-container h1 {
            font-family: var(--fonte-titulo);
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: -1px;
            color: #fff;
        }

        #filtros { 
            background: var(--bg-card); 
            padding: 20px; 
            border-radius: 10px; 
            display: inline-flex; 
            gap: 20px;
            margin: 30px 0; 
            border: 1px solid #222;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        #filtros select { 
            padding: 12px; 
            border-radius: 5px; 
            border: 1px solid #444; 
            background: #000; 
            color: #fff; 
            font-weight: bold;
            cursor: pointer;
        }
        #filtros label { color: var(--cor-primaria); font-weight: bold; text-transform: uppercase; font-size: 0.75rem; display: block; margin-bottom: 5px; }

        #map { 
            height: 70vh; 
            width: 100%; 
            border-radius: 15px; 
            border: 3px solid #1a1a1a;
            background: #f0f0f0;
            z-index: 1;
        }

        /* Estilização dos Ícones de Logo no Mapa */
        .map-logo-marker {
            border: 2px solid var(--cor-primaria);
            border-radius: 50%;
            background: #000;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .map-logo-marker:hover {
            transform: scale(1.2);
            z-index: 1000 !important;
        }

        /* Leaflet Popups Dark */
        .leaflet-popup-content-wrapper { background: #151515; color: #fff; border-radius: 10px; border: 1px solid #333; padding: 5px; }
        .leaflet-popup-tip { background: #151515; }
        .map-popup-content img { width: 80px; height: 80px; border-radius: 8px; margin-bottom: 10px; border: 2px solid #333; object-fit: cover; }
        .map-popup-content h3 { font-family: var(--fonte-titulo); color: var(--cor-primaria); margin: 5px 0; font-size: 1.4rem; text-transform: uppercase; }
        .map-popup-content p { margin: 3px 0; font-size: 0.9rem; }
        .map-popup-content a { 
            color: #000; background: var(--cor-primaria); 
            padding: 8px 15px; display: inline-block; 
            border-radius: 5px; text-decoration: none; 
            font-weight: 900; margin-top: 10px; font-size: 0.75rem; 
        }

        footer { text-align: center; padding: 40px 20px; color: #444; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">COALIZÃO<span>016</span></a>
            </div>

            <div class="hamburger" id="mobile-menu-btn">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <div class="nav-links" id="nav-links-container">
                <a href="index.html" class="nav-link">Início</a>
                <a href="mapaindex.html" class="nav-link active">Mapa da Liga</a>
                <a href="batalhas.html" class="nav-link">Batalhas</a>
                <a href="mcs.html" class="nav-link">MC's</a>
                
                <div class="dropdown">
                    <span class="dropdown-label nav-link">Redes</span>
                    <div class="dropdown-content">
                        <a href="https://www.instagram.com/coalizao016/" target="_blank">Instagram</a>

                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="map-container">
        <h1>O MAPA DO INTERIOR</h1>
        <p style="color: #888; margin-top: -10px;">Encontre as batalhas mais próximas de você</p>
        
        <div id="filtros">
            <div>
                <label>DIA DA SEMANA</label>
                <select id="filtroDia">
                    <option value="">TODOS</option>
                    <option value="Segunda-feira">SEGUNDA</option>
                    <option value="Terça-feira">TERÇA</option>
                    <option value="Quarta-feira">QUARTA</option>
                    <option value="Quinta-feira">QUINTA</option>
                    <option value="Sexta-feira">SEXTA</option>
                    <option value="Sábado">SÁBADO</option>
                    <option value="Domingo">DOMINGO</option>
                </select>
            </div>
            <div>
                <label>CIDADE</label>
                <select id="filtroCidade">
                    <option value="">TODAS AS CIDADES</option>
                </select>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <footer>
        &copy; 2026 Coalizão 016 - Desenvolvido para a Cena Caipira
    </footer>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="batalhas.js"></script>
    
    <script>
        // Lógica Menu Mobile
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navLinks = document.getElementById('nav-links-container');
        menuBtn.addEventListener('click', () => navLinks.classList.toggle('active'));

        // Inicialização do Mapa (Ribeirão Preto como centro inicial)
        const map = L.map("map").setView([-21.17, -47.81], 9);
        
        // Mapa Colorido Padrão
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let markers = [];

        function renderMarkers(filtroDia = "", filtroCidade = "") {
            // Limpa marcadores anteriores
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            batalhas.forEach(b => {
                // Filtro flexível (aceita se o dia selecionado estiver contido na string b.dia)
                const diaBatalha = b.dia || "";
                if ((filtroDia === "" || diaBatalha.includes(filtroDia)) && (filtroCidade === "" || b.cidade === filtroCidade)) {
                    
                    // CRIAÇÃO DO ÍCONE PERSONALIZADO COM A LOGO
                    const logoIcon = L.icon({
                        iconUrl: `images/${b.codigo}.png`,
                        iconSize: [45, 45], // Tamanho da logo no mapa
                        iconAnchor: [22, 22],
                        popupAnchor: [0, -22],
                        className: "map-logo-marker"
                    });

                    const marker = L.marker(b.coords, { icon: logoIcon }).addTo(map);
                    
                    // Fallback para imagem não encontrada
                    marker.on('error', function() {
                        this.setIcon(L.icon({
                            iconUrl: 'images/placeholder.png',
                            iconSize: [40, 40]
                        }));
                    });

                    markers.push(marker);

                    const popupContent = `
                        <div class="map-popup-content" style="text-align:center;">
                            <img src="images/${b.codigo}.png" onerror="this.src='images/placeholder.png'">
                            <h3>${b.nome}</h3>
                            <p><strong>📍 ${b.cidade}</strong></p>
                            <p>${b.dia}</p>
                            <a href="${b.rede || '#'}" target="_blank">VER NO INSTAGRAM</a>
                        </div>
                    `;
                    marker.bindPopup(popupContent);
                }
            });

            // Ajusta o zoom para mostrar todos os pins filtrados
            if (markers.length > 0) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.2));
            }
        }

        // Popular o select de Cidades dinamicamente
        if (typeof batalhas !== 'undefined') {
            const fCidade = document.getElementById("filtroCidade");
            const cidades = [...new Set(batalhas.map(b => b.cidade))].sort();
            
            cidades.forEach(c => {
                const opt = document.createElement("option");
                opt.value = c;
                opt.textContent = c.toUpperCase();
                fCidade.appendChild(opt);
            });

            // Eventos de Mudança nos Filtros
            document.getElementById("filtroDia").addEventListener("change", (e) => {
                renderMarkers(e.target.value, fCidade.value);
            });

            fCidade.addEventListener("change", (e) => {
                renderMarkers(document.getElementById("filtroDia").value, e.target.value);
            });
            
            // Renderização inicial
            renderMarkers();
        }
    </script>
