    <style>
        :root {
            --cor-primaria: #f39c12;
            --bg-dark: #0a0a0a;
            --bg-nav: #000000;
            --bg-card: #151515;
            --text-light: #ffffff;
            --fonte-titulo: 'Anton', sans-serif;
            --fonte-principal: 'Roboto', sans-serif;
        }

        body { 
            margin: 0; 
            font-family: var(--fonte-principal); 
            background: var(--bg-dark); 
            color: var(--text-light); 
            overflow-x: hidden;
        }

        /* --- MENU PADRONIZADO --- */
        nav { background: var(--bg-nav); padding: 15px 0; border-bottom: 2px solid #1a1a1a; position: sticky; top: 0; z-index: 2000; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .nav-logo a { font-size: 1.6rem; font-weight: 900; color: #fff; text-decoration: none; text-transform: uppercase; font-family: var(--fonte-titulo); }
        .nav-logo span { color: var(--cor-primaria); }
        
        .menu-toggle { display: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
        .nav-content { display: flex; align-items: center; gap: 25px; }
        .nav-links { display: flex; gap: 18px; }
        .nav-link { color: #fff !important; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .nav-link.active { color: var(--cor-primaria) !important; }

        .nav-social-group { display: flex; gap: 15px; border-left: 1px solid #333; padding-left: 20px; }
        .nav-social { color: #fff; font-size: 1.1rem; }

        /* --- ESTILOS DO MAPA --- */
        .map-container { max-width: 1200px; margin: 0 auto; padding: 40px 15px; text-align: center; }
        .map-container h1 { font-family: var(--fonte-titulo); font-size: clamp(2.2rem, 7vw, 4rem); text-transform: uppercase; margin-bottom: 5px; color: #fff; line-height: 1; }

        #filtros { 
            background: var(--bg-card); 
            padding: 15px; 
            border-radius: 12px; 
            display: flex; 
            gap: 15px;
            margin: 25px 0; 
            border: 1px solid #222;
            flex-wrap: wrap;
            justify-content: center;
        }
        .filtro-box { text-align: left; flex: 1; min-width: 200px; }
        .filtro-box label { color: var(--cor-primaria); font-weight: bold; text-transform: uppercase; font-size: 0.65rem; display: block; margin-bottom: 5px; letter-spacing: 1px; font-family: 'Roboto'; }
        #filtros select { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #333; background: #000; color: #fff; font-weight: bold; cursor: pointer; font-size: 0.9rem; }

        #map { 
            height: 65vh; 
            width: 100%; 
            border-radius: 15px; 
            border: 2px solid #1a1a1a;
            background: #f0f0f0; /* Fundo original claro enquanto carrega */
            z-index: 1;
        }

        /* Marcadores e Popups */
        .map-logo-marker { border: 2px solid var(--cor-primaria); border-radius: 50%; background: #000; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.2s; }

        .leaflet-popup-content-wrapper { background: #151515; color: #fff; border-radius: 12px; border: 1px solid #333; padding: 5px; }
        .leaflet-popup-tip { background: #151515; }
        .map-popup-content img { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 10px; border: 2px solid var(--cor-primaria); object-fit: cover; }
        .map-popup-content h3 { font-family: 'Bebas Neue'; color: var(--cor-primaria); margin: 0; font-size: 1.5rem; letter-spacing: 1px; }
        .map-popup-content p { margin: 3px 0; font-size: 0.85rem; }
        .map-popup-content a { color: #000; background: var(--cor-primaria); padding: 10px 20px; display: inline-block; border-radius: 25px; text-decoration: none; font-weight: 900; margin-top: 10px; font-size: 0.75rem; text-transform: uppercase; width: 80%; }

        footer { text-align: center; padding: 40px 20px; color: #444; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Mobile Adjustments */
        @media (max-width: 992px) {
            .menu-toggle { display: block; }
            .nav-content { 
                display: none; flex-direction: column; position: absolute; top: 70px; left: 0; width: 100%; 
                background: #000; padding: 30px 0; border-bottom: 3px solid var(--cor-primaria); 
            }
            .nav-content.active { display: flex; }
            .nav-links { flex-direction: column; width: 100%; text-align: center; gap: 20px; }
            .nav-social-group { border-left: none; margin-top: 20px; border-top: 1px solid #222; width: 80%; justify-content: center; padding-top: 20px; }
            
            #map { height: 55vh; }
            .filtro-box { min-width: 100%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="nav-logo"><a href="index.html">COALIZÃO<span>016</span></a></div>
            <div class="menu-toggle" id="mobile-menu"><i class="fas fa-bars"></i></div>
            <div class="nav-content" id="nav-content">
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Início</a>
                    <a href="batalhas.html" class="nav-link">Batalhas</a>
                    <a href="seletivas.html" class="nav-link">Seletivas</a>
                    <a href="regulamento.html" class="nav-link">Regulamento</a>
                    <a href="mapaindex.html" class="nav-link active">Mapa</a>
                </div>
                <div class="nav-social-group">
                    <a href="https://instagram.com/coalizao016" target="_blank" class="nav-social"><i class="fab fa-instagram"></i></a>
                    <a href="https://youtube.com/@Coalizao016" target="_blank" class="nav-social"><i class="fab fa-youtube"></i></a>
                    <a href="https://tiktok.com/@Coalizao016" target="_blank" class="nav-social"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <div class="map-container">
        <h1>O MAPA DO <span style="color: var(--cor-primaria);">INTERIOR</span></h1>
        <p style="color: #666; margin-top: 5px; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px;">Encontre as batalhas mais próximas de você</p>
        
        <div id="filtros">
            <div class="filtro-box">
                <label>DIA DA SEMANA</label>
                <select id="filtroDia">
                    <option value="">TODOS OS DIAS</option>
                    <option value="Segunda-feira">SEGUNDA</option>
                    <option value="Terça-feira">TERÇA</option>
                    <option value="Quarta-feira">QUARTA</option>
                    <option value="Quinta-feira">QUINTA</option>
                    <option value="Sexta-feira">SEXTA</option>
                    <option value="Sábado">SÁBADO</option>
                    <option value="Domingo">DOMINGO</option>
                </select>
            </div>
            <div class="filtro-box">
                <label>CIDADE</label>
                <select id="filtroCidade">
                    <option value="">TODAS AS CIDADES</option>
                </select>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <footer>
        &copy; 2026 Coalizão 016 - Desenvolvido para a Cena Caipira
    </footer>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="batalhas.js"></script>
    
    <script>
        // Menu Mobile Toggle
        const menuBtn = document.getElementById('mobile-menu');
        const navContent = document.getElementById('nav-content');
        menuBtn.onclick = () => {
            navContent.classList.toggle('active');
            menuBtn.querySelector('i').classList.toggle('fa-bars');
            menuBtn.querySelector('i').classList.toggle('fa-times');
        };

        // Configuração do Mapa Original (OpenStreetMap Clássico)
        const map = L.map("map", { tap: false }).setView([-21.17, -47.81], 9);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let markers = [];

        function renderMarkers(filtroDia = "", filtroCidade = "") {
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            if (typeof batalhas === 'undefined') return;

            batalhas.forEach(b => {
                const diaBatalha = b.dia || "";
                if ((filtroDia === "" || diaBatalha.includes(filtroDia)) && 
                    (filtroCidade === "" || b.cidade === filtroCidade)) {
                    
                    const logoIcon = L.icon({
                        iconUrl: `images/${b.codigo}.png`,
                        iconSize: [45, 45],
                        iconAnchor: [22, 22],
                        popupAnchor: [0, -22],
                        className: "map-logo-marker"
                    });

                    const marker = L.marker(b.coords, { icon: logoIcon }).addTo(map);
                    markers.push(marker);

                    const popupContent = `
                        <div class="map-popup-content" style="text-align:center; min-width:180px;">
                            <img src="images/${b.codigo}.png" onerror="this.src='img/default.jpg'">
                            <h3>${b.nome}</h3>
                            <p><strong>📍 ${b.cidade}</strong></p>
                            <p style="color:#aaa;">${b.dia}</p>
                            <a href="${b.linkInstagram || '#'}" target="_blank"><i class="fab fa-instagram"></i> VER PERFIL</a>
                        </div>
                    `;
                    marker.bindPopup(popupContent);
                }
            });

            if (markers.length > 0) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.4));
            }
        }

        // População Dinâmica
        window.onload = () => {
            if (typeof batalhas !== 'undefined') {
                const fCidade = document.getElementById("filtroCidade");
                const fDia = document.getElementById("filtroDia");
                const cidades = [...new Set(batalhas.map(b => b.cidade))].sort();
                
                cidades.forEach(c => {
                    const opt = document.createElement("option");
                    opt.value = c;
                    opt.textContent = c.toUpperCase();
                    fCidade.appendChild(opt);
                });

                fDia.onchange = () => renderMarkers(fDia.value, fCidade.value);
                fCidade.onchange = () => renderMarkers(fDia.value, fCidade.value);
                
                renderMarkers();
            }
        };
    </script>
</body>
