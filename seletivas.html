<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classificados | Coalizão 016 & Liga Caipira</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@300;400;700;900&family=Archivo+Black&family=Bebas+Neue&family=UnifrakturMaguntia&family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --cor-primaria: #f39c12; 
            --ouro: #ffd700;
            --ouro-dark: #b89b00;
            --bg-dark: #0a0a0a; 
            --bg-nav: #000000; 
            --bg-card: #151515;
            --text-light: #ffffff;
            --fonte-principal: 'Roboto', sans-serif;
            --fonte-titulo: 'Anton', sans-serif;
        }

        body { margin: 0; font-family: var(--fonte-principal); background: var(--bg-dark); color: var(--text-light); overflow-x: hidden; }

        /* --- MENU --- */
        nav { background: var(--bg-nav); padding: 15px 0; border-bottom: 2px solid #1a1a1a; position: sticky; top: 0; z-index: 2000; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .nav-logo a { font-size: 1.6rem; font-weight: 900; color: #fff; text-decoration: none; font-family: var(--fonte-titulo); }
        .nav-logo span { color: var(--cor-primaria); }
        .menu-toggle { display: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
        .nav-content { display: flex; align-items: center; gap: 25px; }
        .nav-links { display: flex; gap: 18px; }
        .nav-link { color: #fff !important; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .nav-link.active { color: var(--cor-primaria) !important; }
        .nav-social-group { display: flex; gap: 15px; border-left: 1px solid #333; padding-left: 20px; }
        .nav-social { color: #fff; font-size: 1.1rem; }

        /* --- CONTEÚDO --- */
        .container { max-width: 1100px; margin: 0 auto; padding: 30px 15px; }
        .secao-titulo { font-family: var(--fonte-titulo); font-size: clamp(2rem, 8vw, 3rem); text-transform: uppercase; margin: 40px 0 20px; border-left: 8px solid var(--cor-primaria); padding-left: 15px; color: #fff; }

        /* FILTROS */
        .grid-polos { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; }
        .polo-card { 
            background: var(--bg-card); padding: 10px 15px; border-radius: 6px; border: 1px solid #222; 
            cursor: pointer; text-align: center; transition: 0.3s; font-size: 0.9rem; text-transform: uppercase;
            font-family: 'Bebas Neue'; letter-spacing: 1px; flex: 1; min-width: 140px;
        }
        .polo-card:hover, .polo-card.active { border-color: var(--cor-primaria); background: #1a1a1a; color: var(--cor-primaria); }

        /* GRID MCS */
        .grid-classificados { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card-mc { background: var(--bg-card); border: 1px solid #222; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; position: relative; }
        .card-finalista { border: 2px solid var(--ouro) !important; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }

        .mc-foto-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #000; position: relative; z-index: 1; }
        .mc-foto { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.5s ease; }
        .card-mc:hover .mc-foto { filter: grayscale(0%); transform: scale(1.05); }

        .link-insta-foto {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.7); width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; color: #fff; z-index: 10; transition: 0.3s;
        }
        .link-insta-foto:hover { background: var(--cor-primaria); color: #000; }

        .mc-info { padding: 15px; text-align: center; flex-grow: 1; position: relative; z-index: 2; background: var(--bg-card); }
        .mc-nome-site { font-family: 'Archivo Black'; font-size: 1.1rem; text-transform: uppercase; margin: 0; color: #fff; }
        .mc-batalha-site { font-size: 0.85rem; color: var(--cor-primaria); display: block; margin-top: 5px; font-family: 'Bebas Neue'; }

        .btn-gerar { 
            background: #1a1a1a; color: #fff; border: none; padding: 15px; 
            font-family: 'Bebas Neue'; font-size: 1.1rem; cursor: pointer; border-top: 1px solid #222;
            position: relative; z-index: 3;
        }
        .btn-gerar:hover { background: var(--cor-primaria); color: #000; }

        /* FAIXA FINALISTA DIAGONAL */
        .faixa-finalista {
            position: absolute; bottom: 25px; right: -50px; width: 180px;
            background: linear-gradient(45deg, var(--ouro-dark), var(--ouro), var(--ouro-dark));
            color: #000; text-align: center; font-family: 'Archivo Black', sans-serif;
            font-size: 0.8rem; text-transform: uppercase; font-weight: bold; padding: 8px 0;
            transform: rotate(-45deg); transform-origin: bottom right; z-index: 5;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); pointer-events: none;
        }

        /* TEMPLATE STORIES (OFF-SCREEN) */
        #stories-template { position: fixed; left: -2000px; top: 0; width: 1080px; height: 1920px; background: #000; display: flex; flex-direction: column; align-items: center; }
        .st-bg-title { position: absolute; top: 250px; font-family: 'Archivo Black'; font-size: 160px; color: rgba(255,255,255,0.04); text-align: center; line-height: 0.8; z-index: 1; text-transform: uppercase; }
        .st-logos { position: absolute; top: 80px; width: 900px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .st-logos img { height: 120px; }
        .st-photo-wrapper { position: relative; margin-top: 320px; z-index: 5; width: 940px; height: 1000px; border: 8px solid #fff; }
        .st-photo { width: 100%; height: 100%; object-fit: cover; }
        .st-photo-gradient { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, #000 100%); z-index: 6; }
        .st-battle-badge { position: absolute; top: -45px; right: -45px; background: var(--cor-primaria); color: #000; font-size: 50px; padding: 15px 45px; transform: rotate(4deg); font-family: 'Archivo Black'; z-index: 11; box-shadow: 15px 15px 0 #000; text-transform: uppercase; }
        .st-mc-name { position: absolute; bottom: 370px; font-family: 'Bangers', cursive; font-size: 260px; color: #fff; text-transform: uppercase; z-index: 15; letter-spacing: 5px; line-height: 0.8; text-shadow: 12px 12px 0px var(--cor-primaria); text-align: center; width: 100%; }
        .st-footer { position: absolute; bottom: 80px; width: 100%; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .st-polo-tag { font-size: 55px; letter-spacing: 8px; color: rgba(255,255,255,0.7); margin-bottom: 15px; border-top: 4px solid var(--cor-primaria); padding-top: 10px; text-transform: uppercase; }
        .st-motto { font-family: 'UnifrakturMaguntia'; font-size: 95px; color: var(--cor-primaria); text-align: center; width: 100%; }
        .finalista-mode .st-mc-name { text-shadow: 12px 12px 0px var(--ouro); }
        .finalista-mode .st-battle-badge { background: var(--ouro); }

        @media (max-width: 992px) {
            .menu-toggle { display: block; }
            .nav-content { display: none; flex-direction: column; position: absolute; top: 70px; left: 0; width: 100%; background: #000; padding: 30px 0; border-bottom: 3px solid var(--cor-primaria); }
            .nav-content.active { display: flex; }
            .nav-links { flex-direction: column; width: 100%; text-align: center; gap: 20px; }
            .nav-social-group { border-left: none; margin-top: 20px; border-top: 1px solid #222; width: 80%; justify-content: center; padding-top: 20px; }
            .grid-classificados { grid-template-columns: repeat(2, 1fr); gap: 15px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="nav-logo"><a href="index.html">COALIZÃO<span>016</span></a></div>
            <div class="menu-toggle" id="mobile-menu"><i class="fas fa-bars"></i></div>
            <div class="nav-content" id="nav-content">
                <div class="nav-links">
                    <a href="index.html" class="nav-link">Início</a>
                    <a href="batalhas.html" class="nav-link">Batalhas</a>
                    <a href="seletivas.html" class="nav-link active">Seletivas</a>
                    <a href="regulamento.html" class="nav-link">Regulamento</a>
                    <a href="mapaindex.html" class="nav-link">Mapa</a>
                </div>
                <div class="nav-social-group">
                    <a href="https://instagram.com/coalizao016" target="_blank" class="nav-social"><i class="fab fa-instagram"></i></a>
                    <a href="https://youtube.com/@Coalizao016" target="_blank" class="nav-social"><i class="fab fa-youtube"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="secao-titulo">POLOS REGIONAIS</h2>
        <div class="grid-polos" id="lista-polos"></div>
        
        <h2 class="secao-titulo">CLASSIFICADOS</h2>
        <div class="grid-classificados" id="lista-mcs"></div>
    </div>

    <div id="stories-template">
        <div class="st-bg-title">LIGA CAIPIRA<br>FREESTYLE</div>
        <div class="st-logos">
            <img src="img/coalizao.png" onerror="this.src='https://via.placeholder.com/120?text=COALIZAO'">
            <img src="img/logo-liga.png" onerror="this.src='https://via.placeholder.com/120?text=LIGA'">
        </div>
        <div class="st-photo-wrapper">
            <div id="st-badge" class="st-battle-badge">BATALHA</div>
            <div class="st-photo-gradient"></div>
            <img src="" id="st-main-img" class="st-photo">
        </div>
        <div id="st-name" class="st-mc-name">NOME</div>
        <div class="st-footer">
            <div id="st-polo" class="st-polo-tag">POLO</div>
            <div class="st-motto">Realize seus sonhos ou morra tentando.</div>
        </div>
    </div>

    <script src="batalhas.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        // 1. POLOS ATUALIZADOS E ORDENADOS ALFABETICAMENTE
        const polos = [
            { slug: 'araraquara', cidade: 'Araraquara' },
            { slug: 'bauru', cidade: 'Bauru' },
            { slug: 'campinas', cidade: 'Campinas' },
            { slug: 'franca', cidade: 'Franca' },
            { slug: 'ribeirao', cidade: 'Ribeirão Preto' },
            { slug: 'sjr-preto', cidade: 'São José do Rio Preto' },
            { slug: 'saocarlos', cidade: 'São Carlos' }
        ].sort((a, b) => a.cidade.localeCompare(b.cidade));

        const classificados = [
            { nome: 'TYRANO', insta: 'tyranoofc', poloSlug: 'ribeirao', batId: 'BAT030', finalista: true },
            { nome: 'BUBBA', insta: 'bubbassalto', poloSlug: 'ribeirao', batId: 'BAT030', finalista: true },
            { nome: 'JM', insta: 'jm.almeida016', poloSlug: 'ribeirao', batId: 'BAT030' },
            { nome: 'JIMMY', insta: 'oreiudodorap_', poloSlug: 'ribeirao', batId: 'BAT030' },
            { nome: 'REZENDE', insta: 'rezendeemici', poloSlug: 'ribeirao', batId: 'BAT018' },
            { nome: 'HAIKI', insta: 'mc_haiki', poloSlug: 'ribeirao', batId: 'BAT018' },
            { nome: 'PDG', insta: 'piordageracao', poloSlug: 'araraquara', batId: 'BAT026' },
            { nome: 'VALUSTRE', insta: '_valustre', poloSlug: 'araraquara', batId: 'BAT011' },
            { nome: 'LARIÊ', insta: 'larie.prod', poloSlug: 'araraquara', batId: 'BAT011' },
            { nome: 'NARDEX', insta: 'nardex.emici', poloSlug: 'saocarlos', batId: 'BAT023' },
            { nome: 'GABIZINHA', insta: 'aninha_gabi2013', poloSlug: 'saocarlos', batId: 'BAT023' },
            { nome: 'MS', insta: 'miguelricardosecundino', poloSlug: 'saocarlos', batId: 'BAT008' },
            { nome: 'NOISY', insta: 'noisyemici', poloSlug: 'saocarlos', batId: 'BAT008' },
            { nome: 'JOTACE', insta: '_jotace016', poloSlug: 'saocarlos', batId: 'BAT020' },
            { nome: 'SWART', insta: 'eo_gol_do_moita_016', poloSlug: 'saocarlos', batId: 'BAT020' },
            { nome: 'SUILA', insta: 'suila_do_raap', poloSlug: 'franca', batId: 'BAT019' },
            { nome: 'LAST', insta: '_last_mc', poloSlug: 'franca', batId: 'BAT019' }
        ];

        document.getElementById('mobile-menu').onclick = () => {
            document.getElementById('nav-content').classList.toggle('active');
        };

        function renderizarSite(lista = classificados) {
            const container = document.getElementById('lista-mcs');
            
            // 2. ORDENAÇÃO: FINALISTAS PRIMEIRO, DEPOIS ORDEM ALFABÉTICA GERAL
            const listaOrdenada = [...lista].sort((a, b) => {
                if (a.finalista && !b.finalista) return -1;
                if (!a.finalista && b.finalista) return 1;
                return a.nome.localeCompare(b.nome);
            });

            container.innerHTML = listaOrdenada.map(mc => {
                const batInfo = (typeof batalhas !== 'undefined') ? batalhas.find(b => b.codigo === mc.batId) : null;
                const textoSelo = mc.finalista ? "FINALISTA" : (batInfo ? batInfo.nome : "CLASSIFICADO");
                const poloInfo = polos.find(p => p.slug === mc.poloSlug);
                const nomeL = mc.nome.toLowerCase();
                const localCard = mc.finalista ? "LIGA CAIPIRA | FINAL" : `POLO ${poloInfo.cidade.toUpperCase()}`;
                const faixaHTML = mc.finalista ? `<div class="faixa-finalista">Finalista</div>` : '';

                return `
                    <div class="card-mc ${mc.finalista ? 'card-finalista' : ''}">
                        ${faixaHTML}
                        <div class="mc-foto-container">
                            <a href="https://instagram.com/${mc.insta}" target="_blank" class="link-insta-foto">
                                <i class="fab fa-instagram"></i>
                            </a>
                            <img src="img/${nomeL}.jpg" class="mc-foto" id="img-${mc.nome}" 
                                 onerror="if(this.src.includes('.jpg')){this.src='img/${nomeL}.png'}else{this.src='https://via.placeholder.com/300x300/151515/ffffff?text=${mc.nome}'}">
                        </div>
                        <div class="mc-info">
                            <h3 class="mc-nome-site">${mc.nome}</h3>
                            <span class="mc-batalha-site">${textoSelo}</span>
                        </div>
                        <button class="btn-gerar" onclick="gerarCard('${mc.nome}', '${textoSelo}', '${localCard}', ${mc.finalista || false})">GERAR POST</button>
                    </div>
                `;
            }).join('');
        }

        async function gerarCard(nome, batalha, localInfo, ehFinalista) {
            const template = document.getElementById('stories-template');
            const mainImg = document.getElementById('st-main-img');
            const sourceImg = document.getElementById(`img-${nome}`);
            template.classList.toggle('finalista-mode', ehFinalista);
            document.getElementById('st-name').innerText = nome;
            document.getElementById('st-badge').innerText = batalha;
            document.getElementById('st-polo').innerText = localInfo;
            mainImg.src = sourceImg.src;
            mainImg.onload = async () => {
                try {
                    const canvas = await html2canvas(template, { scale: 1.2, useCORS: true, allowTaint: true });
                    const dataUrl = canvas.toDataURL("image/png");
                    const viewer = document.createElement('div');
                    viewer.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;";
                    viewer.innerHTML = `
                        <img src="${dataUrl}" style="max-height:80vh; width:auto; border-radius:10px; box-shadow: 0 0 40px #000;">
                        <p style="color:#fff; margin:20px 0; font-family:sans-serif; text-align:center;"><b>SEGURE NA IMAGEM PARA SALVAR</b></p>
                        <button onclick="this.parentElement.remove()" style="padding:15px 40px; border-radius:30px; border:none; background:var(--cor-primaria); color:#000; font-weight:bold; cursor:pointer; font-family:'Bebas Neue'; font-size:1.2rem;">VOLTAR</button>
                    `;
                    document.body.appendChild(viewer);
                } catch(e) { alert("Erro ao gerar card."); }
            };
        }

        function renderizarPolos() {
            const pContainer = document.getElementById('lista-polos');
            // ADICIONA "VER TODOS" AO FINAL OU INÍCIO CONFORME PREFERIR
            const htmlPolos = polos.map(p => `<div class="polo-card" onclick="filtrar('${p.slug}', this)">${p.cidade}</div>`).join('');
            pContainer.innerHTML = htmlPolos + `<div class="polo-card active" onclick="resetarFiltro(this)">VER TODOS</div>`;
        }

        function filtrar(slug, elemento) {
            document.querySelectorAll('.polo-card').forEach(el => el.classList.remove('active'));
            elemento.classList.add('active');
            renderizarSite(classificados.filter(m => m.poloSlug === slug));
        }

        function resetarFiltro(elemento) {
            document.querySelectorAll('.polo-card').forEach(el => el.classList.remove('active'));
            elemento.classList.add('active');
            renderizarSite(classificados);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderizarPolos();
            renderizarSite();
        });
    </script>
</body>
</html>
