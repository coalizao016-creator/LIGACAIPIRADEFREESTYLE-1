<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seletivas | Liga Caipira</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;900&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --cor-primaria: #f39c12; 
            --cor-finalista: #ffd700; 
            --bg-dark: #050505; 
            --bg-card: #111111;
        }

        body { 
            margin: 0; font-family: 'Roboto', sans-serif; 
            background: var(--bg-dark); color: #fff; 
            overflow-x: hidden;
        }

        /* --- UI SITE --- */
        nav { background: #000; padding: 15px 0; border-bottom: 2px solid #1a1a1a; text-align: center; }
        .nav-logo { font-family: 'Anton'; font-size: 1.8rem; color: #fff; text-decoration: none; text-transform: uppercase; }
        .nav-logo span { color: var(--cor-primaria); }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .secao-titulo { font-family: 'Anton'; font-size: 2.2rem; text-transform: uppercase; margin-bottom: 30px; border-left: 6px solid var(--cor-primaria); padding-left: 15px; }

        .grid-polos { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 50px; }
        .polo-card { background: var(--bg-card); padding: 15px; border-radius: 8px; border: 1px solid #222; cursor: pointer; text-align: center; transition: 0.3s; }
        .polo-card:hover, .polo-card.active { border-color: var(--cor-primaria); background: #1a1a1a; }

        .grid-classificados { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card-mc { background: var(--bg-card); border: 1px solid #222; border-radius: 12px; overflow: hidden; transition: 0.4s; position: relative; display: flex; flex-direction: column; }
        
        .card-finalista { border: 2px solid var(--cor-finalista) !important; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); }

        .mc-foto-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; position: relative; }
        .mc-foto { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.5s; }
        .card-mc:hover .mc-foto { filter: grayscale(0%); transform: scale(1.05); }

        .mc-info { padding: 15px; text-align: center; flex-grow: 1; }
        .mc-nome { font-family: 'Anton'; font-size: 1.8rem; text-transform: uppercase; margin: 0; line-height: 1; }
        .mc-batalha-tag { font-size: 0.7rem; color: var(--cor-primaria); font-weight: 900; display: block; margin-top: 8px; text-transform: uppercase; }

        .btn-card-download {
            background: #222; color: #fff; border: none; padding: 15px;
            font-size: 0.8rem; font-weight: 900; text-transform: uppercase; cursor: pointer;
            width: 100%; border-top: 1px solid #333; transition: 0.3s;
        }
        .btn-card-download:hover { background: var(--cor-primaria); color: #000; }

        /* --- TEMPLATE STORIES (O QUE SERÁ POSTADO) --- */
        #stories-template {
            position: absolute; left: -9999px; top: -9999px; 
            width: 1080px; height: 1920px;
            background: #000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
        }
        
        /* Texto de fundo gigante */
        .st-bg-text {
            position: absolute; top: 100px; font-family: 'Anton'; font-size: 240px;
            color: rgba(255,255,255,0.03); line-height: 0.8; text-align: center; z-index: 1;
        }

        .st-main { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }

        .st-header { margin-top: 120px; text-align: center; }
        .st-header h1 { font-family: 'Anton'; font-size: 110px; color: var(--cor-primaria); margin: 0; letter-spacing: -2px; }
        .st-header p { font-weight: 900; font-size: 35px; letter-spacing: 15px; margin: -10px 0 0 0; text-transform: uppercase; }

        .st-foto-box { position: relative; margin-top: 60px; }
        .st-foto { 
            width: 900px; height: 950px; object-fit: cover; 
            border: 15px solid #fff; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            filter: sepia(0.2) contrast(1.1);
        }
        
        .st-tag-batalha {
            position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%);
            background: var(--cor-primaria); color: #000; font-family: 'Anton';
            font-size: 60px; padding: 10px 50px; white-space: nowrap; box-shadow: 15px 15px 0px #000;
        }

        .st-mc-nome { font-family: 'Anton'; font-size: 260px; margin-top: 100px; color: #fff; line-height: 0.8; text-shadow: 15px 15px 0px var(--cor-primaria); }
        
        .st-footer { margin-top: auto; width: 100%; text-align: center; padding-bottom: 80px; }
        .st-polo-info { font-weight: 900; font-size: 50px; text-transform: uppercase; color: #fff; letter-spacing: 5px; margin-bottom: 20px; }
        .st-frase { 
            font-family: 'UnifrakturMaguntia'; font-size: 75px; color: var(--cor-primaria);
            width: 100%; display: block; text-align: center;
        }

        /* Variação Finalista */
        .st-finalista .st-header h1, .st-finalista .st-frase, .st-finalista .st-tag-batalha { color: var(--cor-finalista); }
        .st-finalista .st-mc-nome { text-shadow: 15px 15px 0px var(--cor-finalista); }
        .st-finalista .st-foto { border-color: var(--cor-finalista); }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="nav-logo">LIGA <span>CAIPIRA</span></a>
    </nav>

    <div class="container">
        <h2 class="secao-titulo">POLOS</h2>
        <div class="grid-polos" id="lista-polos"></div>

        <h2 class="secao-titulo" id="vagas-titulo">CLASSIFICADOS</h2>
        <div class="grid-classificados" id="lista-classificados"></div>
    </div>

    <div id="stories-template">
        <div class="st-bg-text">LIGA<br>CAIPIRA</div>
        <div class="st-main">
            <div class="st-header">
                <h1>LIGA CAIPIRA</h1>
                <p>DE FREESTYLE</p>
            </div>
            
            <div class="st-foto-box">
                <img src="" id="st-img" class="st-foto" crossorigin="anonymous">
                <div id="st-tag-bat" class="st-tag-batalha">NOME DA BATALHA</div>
            </div>

            <div id="st-mc-nome" class="st-mc-nome">NOME</div>

            <div class="st-footer">
                <div id="st-polo-info" class="st-polo-info">POLO RIBEIRÃO PRETO</div>
                <span class="st-frase">Realize seus sonhos ou morra tentando.</span>
            </div>
        </div>
    </div>

    <script src="batalhas.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        const polos = [
            { slug: 'ribeirao', cidade: 'Ribeirão Preto' },
            { slug: 'araraquara', cidade: 'Araraquara' },
            { slug: 'saocarlos', cidade: 'São Carlos' },
            { slug: 'bauru', cidade: 'Bauru' },
            { slug: 'riopreto', cidade: 'SJ do Rio Preto' },
            { slug: 'franca', cidade: 'Franca' },
            { slug: 'campinas', cidade: 'Campinas' }
        ];

        const classificados = [
            { nome: 'TYRANO', poloSlug: 'ribeirao', insta: 'tyranoofc', finalista: true, batId: 'BAT030' },
            { nome: 'BUBBA', poloSlug: 'ribeirao', insta: 'bubbassalto', finalista: true, batId: 'BAT030' },
            { nome: 'JM', poloSlug: 'ribeirao', batId: 'BAT030', insta: 'jm.almeida016', genero: 'F' },
            { nome: 'JIMMY', poloSlug: 'ribeirao', batId: 'BAT030', insta: 'oreiudodorap_' },
            { nome: 'REZENDE', poloSlug: 'ribeirao', batId: 'BAT018', insta: 'rezendeemici' },
            { nome: 'HAIKI', poloSlug: 'ribeirao', batId: 'BAT018', insta: 'mc_haiki' },
            { nome: 'PDG', poloSlug: 'araraquara', batId: 'BAT026', insta: 'piordageracao' },
            { nome: 'VALUSTRE', poloSlug: 'araraquara', batId: 'BAT011', insta: '_valustre' },
            { nome: 'LARIÊ', poloSlug: 'araraquara', batId: 'BAT011', insta: 'larie.prod', genero: 'F' },
            { nome: 'NARDEX', poloSlug: 'saocarlos', batId: 'BAT023', insta: 'nardex.emici' },
            { nome: 'GABIZINHA', poloSlug: 'saocarlos', batId: 'BAT023', insta: 'aninha_gabi2013', genero: 'F' },
            { nome: 'MS', poloSlug: 'saocarlos', batId: 'BAT008', insta: 'miguelricardosecundino' },
            { nome: 'NOISY', poloSlug: 'saocarlos', batId: 'BAT008', insta: 'noisyemici' },
            { nome: 'JOTACE', poloSlug: 'saocarlos', batId: 'BAT020', insta: '_jotace016' },
            { nome: 'SWART', poloSlug: 'saocarlos', batId: 'BAT020', insta: 'eo_gol_do_moita_016' }
        ];

        function renderizarPolos() {
            document.getElementById('lista-polos').innerHTML = polos.map(p => `
                <div class="polo-card" onclick="filtrarPorPolo('${p.slug}')">${p.cidade}</div>
            `).join('');
        }

        function renderizarClassificados(lista = classificados) {
            const container = document.getElementById('lista-classificados');
            container.innerHTML = lista.map(mc => {
                const batInfo = (typeof batalhas !== 'undefined') ? batalhas.find(b => b.codigo === mc.batId) : null;
                const nomeBat = batInfo ? batInfo.nome : "Batalha Local";
                const nomeLower = mc.nome.toLowerCase();

                return `
                    <div class="card-mc ${mc.finalista ? 'card-finalista' : ''}">
                        <div class="mc-foto-container">
                            <img src="img/${nomeLower}.jpg" class="mc-foto" id="img-${mc.nome}" 
                                 onerror="if(this.src.includes('.jpg')){this.src='img/${nomeLower}.png'}else{this.src='img/default.jpg'}">
                        </div>
                        <div class="mc-info">
                            <h3 class="mc-nome">${mc.nome}</h3>
                            <span class="mc-batalha-tag">${nomeBat}</span>
                        </div>
                        <button class="btn-card-download" onclick="gerarStory('${mc.nome}', '${nomeBat}', '${mc.poloSlug}', ${mc.finalista || false})">
                            Gerar Card Post
                        </button>
                    </div>
                `;
            }).join('');
        }

        async function gerarStory(nome, batalha, poloSlug, ehFinalista) {
            const template = document.getElementById('stories-template');
            ehFinalista ? template.classList.add('st-finalista') : template.classList.remove('st-finalista');

            const polo = polos.find(p => p.slug === poloSlug);
            
            document.getElementById('st-mc-nome').innerText = nome;
            document.getElementById('st-tag-bat').innerText = batalha.toUpperCase();
            document.getElementById('st-polo-info').innerText = `POLO ${polo ? polo.cidade.toUpperCase() : 'CAIPIRA'}`;
            
            const stImg = document.getElementById('st-img');
            stImg.src = document.getElementById(`img-${nome}`).src;

            stImg.onload = async () => {
                const canvas = await html2canvas(template, { scale: 2, useCORS: true });
                const imageData = canvas.toDataURL("image/png");
                const viewer = document.createElement('div');
                viewer.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;";
                viewer.innerHTML = `
                    <img src="${imageData}" style="height:85%; border-radius:10px; box-shadow:0 0 50px #000;">
                    <p style="color:#fff; font-weight:bold; margin-top:15px;">SEGURE NA IMAGEM PARA SALVAR E POSTAR!</p>
                    <button onclick="this.parentElement.remove()" style="margin-top:10px; padding:10px 30px; border-radius:20px; border:none; cursor:pointer; font-weight:bold;">FECHAR</button>
                `;
                document.body.appendChild(viewer);
            };
        }

        function filtrarPorPolo(slug) {
            const filtrados = classificados.filter(mc => mc.poloSlug === slug);
            renderizarClassificados(filtrados);
        }

        function resetarFiltro() { renderizarClassificados(); }

        document.addEventListener('DOMContentLoaded', () => {
            renderizarPolos();
            renderizarClassificados();
        });
    </script>
</body>
</html>
