<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificados | Coalizão 016 & Liga Caipira</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=UnifrakturMaguntia&family=Inter:ital,wght@1,900&display=swap" rel="stylesheet">    
    <style>
        :root {
            --ouro: #ffd700;
            --laranja: #f39c12;
            --dark: #050505;
            --bg-card: #111111;
        }

        body { 
            background: var(--dark); color: #fff; 
            font-family: 'Bebas Neue', sans-serif; margin: 0; 
            overflow-x: hidden;
        }

        /* --- UI DO SITE --- */
        nav { background: #000; padding: 25px 0; border-bottom: 2px solid #1a1a1a; text-align: center; }
        .nav-logo { font-size: 2.2rem; color: #fff; text-decoration: none; text-transform: uppercase; letter-spacing: 3px; }
        .nav-logo span { color: var(--laranja); }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .secao-titulo { font-size: 2.5rem; text-transform: uppercase; margin-bottom: 30px; border-left: 8px solid var(--laranja); padding-left: 15px; color: #fff; }

        /* MENU DE FILTROS */
        .grid-polos { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 50px; }
        .polo-card { 
            background: var(--bg-card); padding: 15px; border-radius: 6px; border: 1px solid #222; 
            cursor: pointer; text-align: center; transition: 0.3s; font-size: 1.1rem; text-transform: uppercase;
        }
        .polo-card:hover, .polo-card.active { border-color: var(--laranja); background: #1a1a1a; color: var(--laranja); }

        /* GRID DE CLASSFICADOS */
        .grid-classificados { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .card-mc { background: var(--bg-card); border: 1px solid #222; border-radius: 12px; overflow: hidden; position: relative; display: flex; flex-direction: column; transition: 0.4s; }
        .card-mc:hover { transform: translateY(-5px); border-color: var(--laranja); }
        .card-finalista { border: 2px solid var(--ouro) !important; box-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }

        .mc-foto-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #000; }
        .mc-foto { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.5s; }
        .card-mc:hover .mc-foto { filter: grayscale(0%); }

        .mc-info { padding: 15px; text-align: center; flex-grow: 1; }
        .mc-nome-site { font-family: 'Archivo Black'; font-size: 1.4rem; text-transform: uppercase; margin: 0; }
        .mc-batalha-site { font-size: 0.9rem; color: var(--laranja); display: block; margin-top: 5px; }

        .btn-gerar { 
            background: #222; color: #fff; border: none; padding: 15px; 
            font-family: 'Bebas Neue'; font-size: 1.1rem; cursor: pointer; border-top: 1px solid #333;
        }
        .btn-gerar:hover { background: var(--laranja); color: #000; }

        /* --- TEMPLATE STORIES (1080x1920) --- */
        #stories-template {
            position: absolute; left: -9999px; top: -9999px; 
            width: 1080px; height: 1920px;
            background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }

        .st-bg-title {
            position: absolute; top: 250px; font-family: 'Archivo Black';
            font-size: 160px; color: rgba(255,255,255,0.04);
            text-align: center; line-height: 0.8; z-index: 1; text-transform: uppercase;
        }

        .st-logos {
            position: absolute; top: 80px; width: 900px;
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        .st-logos img[src*="coalizao"] { height: 110px; width: auto; }
/* Aumento da Logo da Liga para maior legibilidade */
.st-logos img[src*="logo-liga"] { 
    height: 180px; /* Aumentei de 140px para 180px */
    width: auto; 
    filter: drop-shadow(0 0 15px rgba(0,0,0,0.6));
}

/* Nova Estética do Nome do MC */
.st-mc-name {
    position: absolute; 
    bottom: 380px;
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-style: italic; /* O itálico dá dinamismo */
    font-size: 210px; 
    color: #fff;
    text-transform: uppercase; 
    z-index: 15;
    letter-spacing: -8px; 
    line-height: 0.8;
    /* Sombra mais nítida e profunda */
    text-shadow: 12px 12px 0px var(--laranja), 24px 24px 0px rgba(0,0,0,0.5);
    text-align: center; 
    width: 100%;
}

/* Ajuste do nome para o modo finalista */
.finalista-mode .st-mc-name { 
    text-shadow: 12px 12px 0px var(--ouro), 24px 24px 0px rgba(0,0,0,0.5); 
}
        .st-photo-wrapper {
            position: relative; margin-top: 280px; z-index: 5;
            width: 920px; height: 1000px;
            border: 5px solid #fff;
        }
        .st-photo { width: 100%; height: 100%; object-fit: cover; }
        .st-photo-gradient {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 50%, #000 100%);
            z-index: 6;
        }

        .st-battle-badge {
            position: absolute; top: -35px; right: -35px;
            background: var(--laranja); color: #000;
            font-size: 45px; padding: 12px 35px;
            transform: rotate(4deg); font-family: 'Archivo Black';
            z-index: 11; box-shadow: 12px 12px 0 #000;
            text-transform: uppercase;
        }

        .st-mc-name {
            position: absolute; bottom: 380px;
            font-family: 'Archivo Black', sans-serif;
            font-size: 210px; color: #fff;
            text-transform: uppercase; z-index: 15;
            letter-spacing: -12px; line-height: 0.8;
            text-shadow: 18px 18px 0px var(--laranja);
            text-align: center; width: 100%;
        }

        .st-footer {
            position: absolute; bottom: 80px; width: 100%;
            display: flex; flex-direction: column; align-items: center; z-index: 10;
        }
        .st-polo-tag {
            font-size: 55px; letter-spacing: 8px; color: rgba(255,255,255,0.7);
            margin-bottom: 15px; border-top: 3px solid var(--laranja); padding-top: 10px;
            text-transform: uppercase;
        }
        .st-motto {
            font-family: 'UnifrakturMaguntia'; font-size: 85px; color: var(--laranja);
            text-align: center; width: 100%;
        }

        /* Finalista Mode */
        .finalista-mode .st-mc-name { text-shadow: 18px 18px 0px var(--ouro); }
        .finalista-mode .st-battle-badge { background: var(--ouro); }
        .finalista-mode .st-motto { color: var(--ouro); }
        .finalista-mode .st-polo-tag { border-color: var(--ouro); }
    </style>
</head>
<body>

    <nav>
        <div class="nav-logo">COALIZÃO <span>016</span></div>
    </nav>

    <div class="container">
        <h2 class="secao-titulo">POLOS</h2>
        <div class="grid-polos" id="lista-polos"></div>

        <h2 class="secao-titulo">CLASSIFICADOS</h2>
        <div class="grid-classificados" id="lista-mcs"></div>
    </div>

    <div id="stories-template">
        <div class="st-bg-title">LIGA CAIPIRA<br>FREESTYLE</div>
        <div class="st-logos">
            <img src="img/coalizao.png">
            <img src="img/logo-liga.png">
        </div>
        <div class="st-photo-wrapper">
            <div id="st-badge" class="st-battle-badge">BATALHA</div>
            <div class="st-photo-gradient"></div>
            <img src="" id="st-main-img" class="st-photo">
        </div>
        <div id="st-name" class="st-mc-name">NOME</div>
        <div class="st-footer">
            <div id="st-polo" class="st-polo-tag">POLO</div>
            <div class="st-motto">Realize seus sonhos ou morra tentando.</div>
        </div>
    </div>

    <script src="batalhas.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        const polos = [
            { slug: 'ribeirao', cidade: 'Ribeirão Preto' },
            { slug: 'araraquara', cidade: 'Araraquara' },
            { slug: 'saocarlos', cidade: 'São Carlos' },
            { slug: 'bauru', cidade: 'Bauru' },
            { slug: 'riopreto', cidade: 'SJ do Rio Preto' },
            { slug: 'franca', cidade: 'Franca' },
            { slug: 'campinas', cidade: 'Campinas' }
        ];

        const classificados = [
            { nome: 'TYRANO', poloSlug: 'ribeirao', batId: 'BAT030', finalista: true },
            { nome: 'BUBBA', poloSlug: 'ribeirao', batId: 'BAT030', finalista: true },
            { nome: 'JM', poloSlug: 'ribeirao', batId: 'BAT030' },
            { nome: 'JIMMY', poloSlug: 'ribeirao', batId: 'BAT030' },
            { nome: 'REZENDE', poloSlug: 'ribeirao', batId: 'BAT018' },
            { nome: 'HAIKI', poloSlug: 'ribeirao', batId: 'BAT018' },
            { nome: 'PDG', poloSlug: 'araraquara', batId: 'BAT026' },
            { nome: 'VALUSTRE', poloSlug: 'araraquara', batId: 'BAT011' },
            { nome: 'LARIÊ', poloSlug: 'araraquara', batId: 'BAT011' },
            { nome: 'NARDEX', poloSlug: 'saocarlos', batId: 'BAT023' },
            { nome: 'GABIZINHA', poloSlug: 'saocarlos', batId: 'BAT023' },
            { nome: 'MS', poloSlug: 'saocarlos', batId: 'BAT008' },
            { nome: 'NOISY', poloSlug: 'saocarlos', batId: 'BAT008' },
            { nome: 'JOTACE', poloSlug: 'saocarlos', batId: 'BAT020' },
            { nome: 'SWART', poloSlug: 'saocarlos', batId: 'BAT020' }
        ];

        function renderizarSite(lista = classificados) {
            const container = document.getElementById('lista-mcs');
            container.innerHTML = lista.map(mc => {
                const batInfo = (typeof batalhas !== 'undefined') ? batalhas.find(b => b.codigo === mc.batId) : null;
                const nomeBat = batInfo ? batInfo.nome : "Batalha Local";
                const poloInfo = polos.find(p => p.slug === mc.poloSlug);
                const nomeL = mc.nome.toLowerCase();
                return `
                    <div class="card-mc ${mc.finalista ? 'card-finalista' : ''}">
                        <div class="mc-foto-container">
                            <img src="img/${nomeL}.jpg" class="mc-foto" id="img-${mc.nome}" 
                                 onerror="if(this.src.includes('.jpg')){this.src='img/${nomeL}.png'}else{this.src='img/default.jpg'}">
                        </div>
                        <div class="mc-info">
                            <h3 class="mc-nome-site">${mc.nome}</h3>
                            <span class="mc-batalha-site">${nomeBat}</span>
                        </div>
                        <button class="btn-gerar" onclick="gerarCard('${mc.nome}', '${nomeBat}', '${poloInfo ? poloInfo.cidade : 'Regional'}', ${mc.finalista || false})">GERAR CARD POST</button>
                    </div>
                `;
            }).join('');
        }

        async function gerarCard(nome, batalha, cidade, ehFinalista) {
            const template = document.getElementById('stories-template');
            const mainImg = document.getElementById('st-main-img');
            
            template.classList.toggle('finalista-mode', ehFinalista);
            document.getElementById('st-name').innerText = nome;
            document.getElementById('st-badge').innerText = batalha;
            document.getElementById('st-polo').innerText = `POLO ${cidade.toUpperCase()}`;
            
            mainImg.src = document.getElementById(`img-${nome}`).src;
            
            mainImg.onload = async () => {
                const canvas = await html2canvas(template, { 
                    scale: 1.5, 
                    useCORS: true, 
                    backgroundColor: '#000' 
                });
                
                const dataUrl = canvas.toDataURL("image/png");
                const viewer = document.createElement('div');
                viewer.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center;";
                viewer.innerHTML = `
                    <img src="${dataUrl}" style="height:85vh; border: 5px solid #333; border-radius:15px; box-shadow: 0 0 50px #000;">
                    <p style="color:#fff; font-family:sans-serif; margin-top:15px; letter-spacing:1px;"><b>SEGURE NA IMAGEM PARA SALVAR</b></p>
                    <button onclick="this.parentElement.remove()" style="margin-top:15px; padding:12px 40px; border-radius:30px; border:none; background:white; font-family:'Archivo Black'; cursor:pointer; text-transform:uppercase;">FECHAR</button>
                `;
                document.body.appendChild(viewer);
            };
        }

        function renderizarPolos() {
            const pContainer = document.getElementById('lista-polos');
            pContainer.innerHTML = polos.map(p => `
                <div class="polo-card" onclick="filtrar('${p.slug}', this)">${p.cidade}</div>
            `).join('') + `<div class="polo-card" onclick="resetarFiltro(this)">VER TODOS</div>`;
        }

        function filtrar(slug, elemento) {
            document.querySelectorAll('.polo-card').forEach(el => el.classList.remove('active'));
            elemento.classList.add('active');
            const filtrados = classificados.filter(m => m.poloSlug === slug);
            renderizarSite(filtrados);
        }

        function resetarFiltro(elemento) {
            document.querySelectorAll('.polo-card').forEach(el => el.classList.remove('active'));
            elemento.classList.add('active');
            renderizarSite(classificados);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderizarPolos();
            renderizarSite();
        });
    </script>
</body>
</html>
