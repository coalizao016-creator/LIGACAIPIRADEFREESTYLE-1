<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seletivas & Classificados | Coalizão 016</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@300;400;700;900&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --cor-primaria: #f39c12; 
            --bg-dark: #0a0a0a; 
            --bg-nav: #000000; 
            --bg-card: #151515;
            --text-light: #ffffff;
            --fonte-principal: 'Roboto', sans-serif;
            --fonte-titulo: 'Anton', sans-serif; 
            --fonte-zika: 'UnifrakturMaguntia', cursive; 
        }

        body { 
            margin: 0; font-family: var(--fonte-principal); 
            background: var(--bg-dark); color: var(--text-light); 
            line-height: 1.6; overflow-x: hidden; scroll-behavior: smooth;
        }

        /* --- MENU --- */
        nav { background: var(--bg-nav); padding: 15px 0; border-bottom: 2px solid #1a1a1a; position: sticky; top: 0; z-index: 2000; }
        .nav-container { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .nav-logo a { font-size: 1.6rem; font-weight: 900; color: #fff; text-decoration: none; text-transform: uppercase; font-family: var(--fonte-titulo); }
        .nav-logo span { color: var(--cor-primaria); }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-link { color: #fff !important; text-decoration: none; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--cor-primaria) !important; }

        /* --- HEADER --- */
        .header-seletivas {
            padding: 80px 20px; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1571266028243-3716f02d2d2e?auto=format&fit=crop&q=80'); 
            background-size: cover; background-position: center; border-bottom: 5px solid var(--cor-primaria);
        }
        .titulo-pagina { font-family: var(--fonte-titulo); font-size: clamp(3rem, 8vw, 5rem); text-transform: uppercase; margin: 0; }

        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .secao-titulo { font-family: var(--fonte-titulo); font-size: 2rem; text-transform: uppercase; margin-bottom: 30px; border-left: 6px solid var(--cor-primaria); padding-left: 15px; }

        /* --- GRID POLOS --- */
        .grid-polos { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 60px; }
        .polo-card { background: var(--bg-card); padding: 20px; border-radius: 8px; border: 1px solid #222; transition: 0.3s; cursor: pointer; }
        .polo-card:hover, .polo-card.active { border-color: var(--cor-primaria); background: #1a1a1a; }
        .polo-cidade { font-family: var(--fonte-titulo); font-size: 1.4rem; text-transform: uppercase; margin: 0; }
        .polo-batalha { color: var(--cor-primaria); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }

        /* --- GRID CLASSIFICADOS --- */
        .grid-classificados { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .card-mc { background: var(--bg-card); border: 1px solid #222; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; position: relative; }
        .card-mc:hover { border-color: var(--cor-primaria); transform: translateY(-5px); }

        .mc-foto-container { width: 100%; aspect-ratio: 1/1; overflow: hidden; background: #222; position: relative; cursor: pointer; }
        .mc-foto { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.4s; }
        .card-mc:hover .mc-foto { filter: grayscale(0%); }

        .mc-insta-overlay {
            position: absolute; top: 10px; right: 10px; background: var(--cor-primaria);
            color: #000; width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.3s; transform: scale(0.5);
        }
        .card-mc:hover .mc-insta-overlay { opacity: 1; transform: scale(1); }

        .mc-info { padding: 12px; text-align: center; flex-grow: 1; }
        .mc-nome { font-family: var(--fonte-titulo); font-size: 1.6rem; text-transform: uppercase; color: #fff; margin: 0; }
        .mc-batalha-tag { display: inline-block; font-size: 0.65rem; color: var(--cor-primaria); font-weight: 900; text-transform: uppercase; border: 1px solid rgba(243, 156, 18, 0.3); padding: 2px 8px; border-radius: 4px; }

        .btn-card-download {
            background: #222; color: var(--cor-primaria); border: none; padding: 10px;
            font-size: 0.7rem; font-weight: 900; text-transform: uppercase; cursor: pointer;
            width: 100%; transition: 0.3s; border-top: 1px solid #333; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-card-download:hover { background: var(--cor-primaria); color: #000; }

        .btn-reset { background: transparent; border: 1px solid #333; color: #666; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; margin-left: 10px; }

        /* --- STORIES TEMPLATE (OCULTO) --- */
        #stories-template {
            position: absolute; left: -9999px; top: -9999px; width: 1080px; height: 1920px;
            background: #000; display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }
        .st-background { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at center, #222 0%, #000 70%); }
        .st-overlay {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(243, 156, 18, 0.25) 0%, transparent 45%),
                        radial-gradient(ellipse at bottom, rgba(243, 156, 18, 0.15) 0%, transparent 50%);
            z-index: 1;
        }
        .st-content { position: relative; z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .st-header-title { font-family: var(--fonte-titulo); font-size: 90px; color: var(--cor-primaria); margin-top: 120px; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 30px rgba(243, 156, 18, 0.6); }
        .st-sub-header { font-family: var(--fonte-principal); font-size: 40px; color: #fff; font-weight: 900; text-transform: uppercase; letter-spacing: 12px; margin-top: -15px; }
        .st-foto-wrapper { position: relative; margin-top: 80px; }
        .st-foto { width: 850px; height: 850px; object-fit: cover; border-radius: 20px; border: 10px solid var(--cor-primaria); box-shadow: 0 0 60px rgba(243, 156, 18, 0.4); }
        .st-tag { position: absolute; bottom: -40px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; font-family: var(--fonte-titulo); font-size: 80px; padding: 10px 80px; text-transform: uppercase; box-shadow: 15px 15px 0px var(--cor-primaria); white-space: nowrap; }
        .st-mc-nome { font-family: var(--fonte-titulo); font-size: 240px; color: #fff; text-transform: uppercase; margin-top: 110px; line-height: 0.8; text-shadow: 8px 8px 0px var(--cor-primaria); }
        .st-polo-info { font-size: 55px; color: #fff; font-weight: 900; margin-top: 30px; text-transform: uppercase; border-top: 3px solid var(--cor-primaria); padding-top: 15px; letter-spacing: 3px; margin-bottom: 50px;}
        .st-frase-tema { 
            margin-top: auto; padding-bottom: 80px; 
            font-family: var(--fonte-zika); font-size: 65px; 
            color: var(--cor-primaria); text-shadow: 0 0 15px rgba(243, 156, 18, 0.7); 
            letter-spacing: 1px; max-width: 90%; line-height: 1.1;
            text-align: center; width: 100%; display: center; justify-content: center;
        }

        @media (max-width: 768px) { .grid-classificados { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="nav-logo"><a href="index.html">COALIZÃO<span>016</span></a></div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Início</a>
                <a href="batalhas.html" class="nav-link">Batalhas</a>
                <a href="seletivas.html" class="nav-link active">Seletivas</a>
                <a href="regulamento.html" class="nav-link">Regulamento</a>
                <a href="mapaindex.html" class="nav-link">Mapa</a>
            </div>
        </div>
    </nav>

    <header class="header-seletivas">
        <h1 class="titulo-pagina">SELETIVAS <span style="color: var(--cor-primaria);">REGIONAIS</span></h1>
    </header>

    <div class="container">
        <h2 class="secao-titulo">ESCOLHA UM POLO</h2>
        <div class="grid-polos" id="lista-polos"></div>

        <h2 class="secao-titulo" id="vagas-titulo">CLASSIFICADOS GERAIS <button class="btn-reset" onclick="resetarFiltro()">Ver Todos</button></h2>
        <div class="grid-classificados" id="lista-classificados"></div>
    </div>

    <div id="stories-template">
        <div class="st-background"></div>
        <div class="st-overlay"></div>
        <div class="st-content">
            <div class="st-header-title">LIGA CAIPIRA</div>
            <div class="st-sub-header">DE FREESTYLE</div>
            <div class="st-foto-wrapper">
                <img src="" id="st-img" class="st-foto" crossorigin="anonymous">
                <div id="st-tag-text" class="st-tag">CLASSIFICADO</div>
            </div>
            <div id="st-mc-nome" class="st-mc-nome">NOME</div>
            <div id="st-polo-nome" class="st-polo-info">POLO RIBEIRÃO PRETO</div>
            <div class="st-frase-tema">Realize seus sonhos<br>ou morra tentando.</div>
        </div>
    </div>

    <script src="batalhas.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        const polos = [
            { id: '01', slug: 'ribeirao', cidade: 'Ribeirão Preto', batalha: 'Sangue na 7' },
            { id: '02', slug: 'araraquara', cidade: 'Araraquara', batalha: 'Batalha do Raio' },
            { id: '03', slug: 'saocarlos', cidade: 'São Carlos', batalha: 'Hip-hop Salva' },
            { id: '04', slug: 'bauru', cidade: 'Bauru', batalha: 'Batalha dos 13' },
            { id: '05', slug: 'riopreto', cidade: 'SJ do Rio Preto', batalha: 'Batalha do Braile' },
            { id: '06', slug: 'franca', cidade: 'Franca', batalha: 'Batalha dos Nômades' },
            { id: '07', slug: 'campinas', cidade: 'Campinas', batalha: 'Batalha do Cálice' }
        ];

        const classificados = [
            { nome: 'JM', poloSlug: 'ribeirao', batId: 'BAT030', insta: 'jm.almeida016', genero: 'F' },
            { nome: 'JIMMY', poloSlug: 'ribeirao', batId: 'BAT030', insta: 'oreiudodorap_' },
            { nome: 'REZENDE', poloSlug: 'ribeirao', batId: 'BAT018', insta: 'rezendeemici' },
            { nome: 'HAIKI', poloSlug: 'ribeirao', batId: 'BAT018', insta: 'mc_haiki' },
            { nome: 'PDG', poloSlug: 'araraquara', batId: 'BAT026', insta: 'piordageracao' },
            { nome: 'VALUSTRE', poloSlug: 'araraquara', batId: 'BAT011', insta: '_valustre' },
            { nome: 'LARIÊ', poloSlug: 'araraquara', batId: 'BAT011', insta: 'larie.prod', genero: 'F' },
            { nome: 'NARDEX', poloSlug: 'saocarlos', batId: 'BAT023', insta: 'nardex.emici' },
            { nome: 'GABIZINHA', poloSlug: 'saocarlos', batId: 'BAT023', insta: 'aninha_gabi2013', genero: 'F' },
            { nome: 'MS', poloSlug: 'saocarlos', batId: 'BAT008', insta: 'miguelricardosecundino' },
            { nome: 'NOISY', poloSlug: 'saocarlos', batId: 'BAT008', insta: 'noisyemici' },
            { nome: 'JOTACE', poloSlug: 'saocarlos', batId: 'BAT010', insta: '_jotace016' },
            { nome: 'SWART', poloSlug: 'saocarlos', batId: 'BAT010', insta: 'swart_mc' }
        ];

        function renderizarPolos() {
            const container = document.getElementById('lista-polos');
            container.innerHTML = polos.map(p => `
                <div class="polo-card" id="polo-${p.slug}" onclick="filtrarPorPolo('${p.slug}')">
                    <h3 class="polo-cidade">${p.cidade}</h3>
                    <span class="polo-batalha">${p.batalha}</span>
                </div>
            `).join('');
        }

        function renderizarClassificados(lista = classificados, nomePolo = "GERAIS") {
            const container = document.getElementById('lista-classificados');
            const titulo = document.getElementById('vagas-titulo');
            const listaOrdenada = [...lista].sort((a, b) => a.nome.localeCompare(b.nome));

            titulo.innerHTML = `CLASSIFICADOS: <span style="color: var(--cor-primaria);">${nomePolo}</span> ${nomePolo !== "GERAIS" ? '<button class="btn-reset" onclick="resetarFiltro()">Voltar</button>' : ''}`;

            container.innerHTML = listaOrdenada.map(mc => {
                const batInfo = (typeof batalhas !== 'undefined') ? batalhas.find(b => b.codigo === mc.batId) : null;
                const nomeBat = batInfo ? batInfo.nome : "Batalha Local";
                const nomeArq = mc.nome.toLowerCase();
                const linkInsta = mc.insta ? `https://instagram.com/${mc.insta}` : '#';
                const poloInfo = polos.find(p => p.slug === mc.poloSlug);

                return `
                    <div class="card-mc">
                        <div class="mc-foto-container" onclick="window.open('${linkInsta}', '_blank')">
                            <img src="img/${nomeArq}.jpg" class="mc-foto" id="img-${mc.nome}" onerror="tentarPng(this, '${nomeArq}')">
                            <div class="mc-insta-overlay"><i class="fab fa-instagram"></i></div>
                        </div>
                        <div class="mc-info">
                            <h3 class="mc-nome">${mc.nome}</h3>
                            <div class="mc-batalha-tag"><span class="batalha-nome-mini">${nomeBat}</span></div>
                        </div>
                        <button class="btn-card-download" onclick="baixarArte('${mc.nome}', '${poloInfo.cidade}', '${mc.genero || 'M'}')">
                            <i class="fas fa-camera"></i> Gerar Card
                        </button>
                    </div>
                `;
            }).join('');
        }

        function tentarPng(img, nome) {
            if (img.src.includes('.jpg')) { 
                img.src = `img/${nome}.png`; 
            } else { 
                img.src = 'img/default-mc.jpg'; 
                img.onerror = null; 
            }
        }

        function filtrarPorPolo(slug) {
            document.querySelectorAll('.polo-card').forEach(c => c.classList.remove('active'));
            if(document.getElementById(`polo-${slug}`)) document.getElementById(`polo-${slug}`).classList.add('active');
            const filtrados = classificados.filter(mc => mc.poloSlug === slug);
            const poloInfo = polos.find(p => p.slug === slug);
            renderizarClassificados(filtrados, poloInfo.cidade.toUpperCase());
        }

        function resetarFiltro() {
            document.querySelectorAll('.polo-card').forEach(c => c.classList.remove('active'));
            renderizarClassificados();
        }

        // --- FUNÇÃO DE GERAR CARD (COM SUPORTE AO INSTAGRAM) ---
        async function baixarArte(nome, cidade, genero) {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> GERANDO...';

            document.getElementById('st-mc-nome').innerText = nome;
            document.getElementById('st-polo-nome').innerText = `POLO ${cidade.toUpperCase()}`;
            document.getElementById('st-tag-text').innerText = (genero === 'F') ? 'CLASSIFICADA' : 'CLASSIFICADO';
            
            const imgMC = document.getElementById(`img-${nome}`);
            const stImg = document.getElementById('st-img');
            
            // Força o carregamento da imagem do MC no template antes de gerar o canvas
            stImg.src = imgMC.src;

            stImg.onload = async () => {
                try {
                    const canvas = await html2canvas(document.getElementById('stories-template'), {
                        scale: 2,
                        useCORS: true,
                        backgroundColor: "#000000"
                    });

                    const imageData = canvas.toDataURL("image/png");

                    // CRIA O MODAL PARA SALVAR
                    const modal = document.createElement('div');
                    modal.style = `
                        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                        background: rgba(0,0,0,0.95); z-index: 99999; display: flex;
                        flex-direction: column; align-items: center; justify-content: center;
                        padding: 20px; box-sizing: border-box;
                    `;

                    modal.innerHTML = `
                        <div style="text-align:center; width:100%; max-width:400px;">
                            <p style="color:#f39c12; font-family:'Anton'; font-size:1.5rem; margin-bottom:10px;">CARD GERADO!</p>
                            <p style="color:#fff; font-size:0.9rem; margin-bottom:15px;">Segure o dedo na imagem abaixo para salvar.</p>
                            <img src="${imageData}" style="width:100%; border-radius:10px; border:2px solid #f39c12; pointer-events: auto;">
                            <button id="close-modal" style="margin-top:20px; background:#333; color:#fff; border:none; padding:10px 20px; border-radius:5px; font-weight:bold; cursor:pointer;">FECHAR</button>
                        </div>
                    `;

                    document.body.appendChild(modal);

                    document.getElementById('close-modal').onclick = () => {
                        document.body.removeChild(modal);
                        btn.innerHTML = originalText;
                    };

                } catch (err) {
                    console.error(err);
                    alert("Erro ao gerar. Tente um print!");
                    btn.innerHTML = originalText;
                }
            };
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderizarPolos();
            renderizarClassificados();
        });
    </script>
</body>
</html>
